x-logging: &default-logging
  driver: "local"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v3.31.2
    restart: always
    logging: *default-logging
    profiles: [images]
    cpus: "1"
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      IMGPROXY_MAX_ANIMATION_FRAMES: "1"
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/tmp"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
    mem_limit: 512m
    networks:
      - internal

  dicebear:
    image: dicebear/api:3
    restart: always
    logging: *default-logging
    profiles: [images]
    expose:
      - "3000"
    tmpfs:
      - "/run"
      - "/tmp"
    environment:
      WEBP_SIZE_MAX: "256"
      PNG_SIZE_MAX: "256"
    mem_limit: 256m
    cpus: "0.5"
    networks:
      - internal

  nsfwjs:
    build: ./nsfwjs-service
    restart: always
    logging: *default-logging
    profiles: [moderation]
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      CONTENT_MODERATION_API_KEY: ${CONTENT_MODERATION_API_KEY:-}
    mem_limit: 4g
    cpus: "2"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  minio:
    image: minio/minio:latest
    restart: always
    logging: *default-logging
    profiles: [minio]
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      # NOTE: These are only required when the `minio` profile is enabled.
      # Using `:-` defaults prevents `docker compose` from failing during env interpolation
      # when MinIO is not selected.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - miniodata:/data
    networks:
      - internal

  livekit:
    image: livekit/livekit-server:v1.10.1
    restart: always
    logging: *default-logging
    profiles: [livekit]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "3478:3478/udp"
      - "50000-60000:50000-60000/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    depends_on:
      livekit-redis:
        condition: service_healthy
    networks:
      - internal

  livekit-redis:
    image: redis:7.4.8-alpine
    restart: always
    logging: *default-logging
    profiles: [livekit]
    volumes:
      - livekitredis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: always
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:
  miniodata:
  livekitredis:

networks:
  internal:
    driver: bridge
