x-logging: &default-logging
  driver: "local"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

x-runtime-hardening: &runtime-hardening
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    <<: *runtime-hardening
    image: postgres:17.9-alpine
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 512
    mem_reservation: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gatherend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-gatherend}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-gatherend} -d $${POSTGRES_DB:-gatherend}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - db

  redis:
    <<: *runtime-hardening
    image: redis:7.4.8-alpine
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 128
    mem_reservation: 128m
    command: redis-server --requirepass ${REDIS_PASSWORD:?required}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - db

  migrate:
    <<: *runtime-hardening
    build:
      context: ..
      dockerfile: apps/gatherend-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?required}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:?required}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-}
        NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL:-}
        NEXT_PUBLIC_IMGPROXY_URL: ${NEXT_PUBLIC_IMGPROXY_URL:-}
        NEXT_PUBLIC_STORAGE_DOMAIN: ${NEXT_PUBLIC_STORAGE_DOMAIN:-}
        NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:?required}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_DICEBEAR_URL: ${NEXT_PUBLIC_DICEBEAR_URL:-}
    profiles: [migrate]
    restart: "no"
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 256
    mem_reservation: 512m
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-gatherend}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gatherend}
      DIRECT_URL: postgresql://${POSTGRES_USER:-gatherend}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gatherend}
    networks:
      - db

  express:
    <<: *runtime-hardening
    build:
      context: ..
      dockerfile: apps/express/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 256
    mem_reservation: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-gatherend_app}:${POSTGRES_APP_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-gatherend}
      DIRECT_URL: postgresql://${POSTGRES_APP_USER:-gatherend_app}:${POSTGRES_APP_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-gatherend}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?required}
      STORAGE_ACCOUNT_ID: ${STORAGE_ACCOUNT_ID:-}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME:-}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      ATTACHMENTS_BUCKET_NAME: ${ATTACHMENTS_BUCKET_NAME:-}
      ATTACHMENTS_BASE_URL: ${ATTACHMENTS_BASE_URL:-}
      ATTACHMENTS_HMAC_KEY: ${ATTACHMENTS_HMAC_KEY:?required}
      ATTACHMENTS_URL_TTL_SECONDS: ${ATTACHMENTS_URL_TTL_SECONDS:-}
      ATTACHMENTS_URL_EXP_ROUND_SECONDS: ${ATTACHMENTS_URL_EXP_ROUND_SECONDS:-}
      IMGPROXY_URL: ${IMGPROXY_URL:-}
      IMGPROXY_KEY: ${IMGPROXY_KEY:-}
      IMGPROXY_SALT: ${IMGPROXY_SALT:-}
      CONTENT_MODERATION_URL: ${CONTENT_MODERATION_URL:-}
      CONTENT_MODERATION_API_KEY: ${CONTENT_MODERATION_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:?required}
      RAILWAY_PRIVATE_URL: http://web:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?required}
      MEDIA_ALLOWED_HOSTNAMES: ${MEDIA_ALLOWED_HOSTNAMES:-}
    networks:
      - app
      - db
      - services
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--input-type=module",
          "-e",
          "import http from 'http'; http.get('http://localhost:3001/health', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    <<: *runtime-hardening
    build:
      context: ..
      dockerfile: apps/gatherend-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?required}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:?required}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-}
        NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL:-}
        NEXT_PUBLIC_IMGPROXY_URL: ${NEXT_PUBLIC_IMGPROXY_URL:-}
        NEXT_PUBLIC_STORAGE_DOMAIN: ${NEXT_PUBLIC_STORAGE_DOMAIN:-}
        NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:?required}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_DICEBEAR_URL: ${NEXT_PUBLIC_DICEBEAR_URL:-}
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 256
    mem_reservation: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-gatherend_app}:${POSTGRES_APP_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-gatherend}
      DIRECT_URL: postgresql://${POSTGRES_APP_USER:-gatherend_app}:${POSTGRES_APP_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-gatherend}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      EMAIL_VERIFICATION_ENABLED: ${EMAIL_VERIFICATION_ENABLED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
      ATTACHMENTS_BASE_URL: ${ATTACHMENTS_BASE_URL:-}
      IMGPROXY_URL: ${IMGPROXY_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      POSTMARK_WEBHOOK_SECRET: ${POSTMARK_WEBHOOK_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_PROFILE_IDS: ${ADMIN_PROFILE_IDS:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      CRON_SECRET: ${CRON_SECRET:-}
      SITE_URL: ${SITE_URL:-}
      SOCKET_SERVER_URL: http://express:3001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    networks:
      - app
      - db
      - services
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  imgproxy:
    <<: *runtime-hardening
    image: ghcr.io/imgproxy/imgproxy:v3.31.2
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 128
    mem_reservation: 256m
    profiles: [images]
    cpus: "1"
    expose:
      - "8080"
    environment:
      IMGPROXY_MAX_ANIMATION_FRAMES: "1"
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/tmp"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_KEY: ${IMGPROXY_KEY:-}
      IMGPROXY_SALT: ${IMGPROXY_SALT:-}
    mem_limit: 512m
    networks:
      - services
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dicebear:
    <<: *runtime-hardening
    image: dicebear/api:3
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 128
    mem_reservation: 128m
    profiles: [images]
    expose:
      - "3000"
    tmpfs:
      - "/run"
      - "/tmp"
    environment:
      WEBP_SIZE_MAX: "256"
      PNG_SIZE_MAX: "256"
    mem_limit: 256m
    cpus: "0.5"
    networks:
      - services
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nsfwjs:
    <<: *runtime-hardening
    build:
      context: ./services/nsfwjs-service
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 512
    mem_reservation: 1g
    profiles: [moderation]
    expose:
      - "5000"
    environment:
      CONTENT_MODERATION_API_KEY: ${CONTENT_MODERATION_API_KEY:-}
    mem_limit: 4g
    cpus: "2"
    networks:
      - services
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  minio:
    <<: *runtime-hardening
    image: minio/minio:latest
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 256
    mem_reservation: 512m
    profiles: [minio]
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      # NOTE: These are only required when the `minio` profile is enabled.
      # Using `:-` defaults prevents `docker compose` from failing during env interpolation
      # when MinIO is not selected.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - miniodata:/data
    networks:
      - services

  livekit:
    <<: *runtime-hardening
    image: livekit/livekit-server:v1.10.1
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    pids_limit: 512
    mem_reservation: 512m
    profiles: [livekit]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "3478:3478/udp"
      - "50000-60000:50000-60000/udp"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    depends_on:
      livekit-redis:
        condition: service_healthy
    networks:
      - services

  livekit-redis:
    <<: *runtime-hardening
    image: redis:7.4.8-alpine
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 128
    mem_reservation: 128m
    profiles: [livekit]
    volumes:
      - livekitredis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - services

  caddy:
    <<: *runtime-hardening
    build:
      context: ../apps/gatherend-gateway
    restart: unless-stopped
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    mem_reservation: 128m
    depends_on:
      web:
        condition: service_healthy
      express:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      PORT: "80"
      CF_ORIGIN_SECRET: ${CF_ORIGIN_SECRET:?required}
      EXPRESS_UPSTREAM: express:3001
      NEXT_UPSTREAM: web:3000
      IMAGES_DOMAIN: ${IMAGES_DOMAIN:-}
      AVATARS_DOMAIN: ${AVATARS_DOMAIN:-}
      MODERATION_DOMAIN: ${MODERATION_DOMAIN:-}
      APP_DOMAIN: ${APP_DOMAIN:-}
      MINIO_DOMAIN: ${MINIO_DOMAIN:-}
      LIVEKIT_DOMAIN: ${LIVEKIT_DOMAIN:-}
      LIVEKIT_TURN_DOMAIN: ${LIVEKIT_TURN_DOMAIN:-}
      CONTENT_MODERATION_API_KEY: ${CONTENT_MODERATION_API_KEY:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app
      - services
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  miniodata:
  livekitredis:
  caddy_data:
  caddy_config:

networks:
  app:
    driver: bridge
  db:
    driver: bridge
    internal: true
  services:
    driver: bridge
